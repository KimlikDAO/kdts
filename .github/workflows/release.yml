name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  compiler_jar:
    name: compiler jar
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-cache: true
          repository-cache: true
      - run: |
          unset ANDROID_HOME
          unset ANDROID_SDK_ROOT
          bun run build:compiler
      - uses: actions/upload-artifact@v4
        with:
          name: compiler-jar
          path: build/compiler/compiler.jar
          if-no-files-found: error

  build_kdts:
    name: build kdts
    needs: compiler_jar
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/download-artifact@v4
        with:
          name: compiler-jar
          path: build/compiler
      - run: |
          bun install --frozen-lockfile
          bun run build -- --compiler-jar build/compiler/compiler.jar
      - uses: actions/upload-artifact@v4
        with:
          name: kdts
          path: build/kdts
          if-no-files-found: error

  build_macos:
    name: build gcc-macos
    needs: compiler_jar
    runs-on: macos-14
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm-community
          java-version: "21"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: "true"
      - uses: actions/download-artifact@v4
        with:
          name: compiler-jar
          path: build/compiler
      - run: bun run build:native -- --compiler-jar build/compiler/compiler.jar
      - uses: actions/upload-artifact@v4
        with:
          name: gcc-macos
          path: build/gcc-macos
          if-no-files-found: error

  build_linux:
    name: build gcc-linux
    needs: compiler_jar
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      MUSL_HOME: ${{ github.workspace }}/musl-toolchain
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: kraj/musl
          ref: c47ad25ea3b484e10326f933e927c0bc8cded3da
          path: musl
          clean: false
      - uses: actions/checkout@v6
        with:
          repository: madler/zlib
          ref: 04f42ceca40f73e2978b50e93806c2a18c1281fc
          path: zlib
          clean: false
      - run: |
          pushd musl
          ./configure --prefix="$MUSL_HOME" --static
          sudo make
          make install
          popd

          ln -s "$MUSL_HOME/bin/musl-gcc" "$MUSL_HOME/bin/x86_64-linux-musl-gcc"
          echo "$MUSL_HOME/bin" >> "$GITHUB_PATH"
          x86_64-linux-musl-gcc --version

          pushd zlib
          CC=musl-gcc ./configure --prefix="$MUSL_HOME" --static
          make
          make install
          popd
      - uses: oven-sh/setup-bun@v2
      - uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm-community
          java-version: "21"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: "true"
      - uses: actions/download-artifact@v4
        with:
          name: compiler-jar
          path: build/compiler
      - run: bun run build:native -- --compiler-jar build/compiler/compiler.jar
      - uses: actions/upload-artifact@v4
        with:
          name: gcc-linux
          path: build/gcc-linux
          if-no-files-found: error

  build_linux_arm64:
    name: build gcc-linux-arm64
    needs: compiler_jar
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm-community
          java-version: "21"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: "true"
      - uses: actions/download-artifact@v4
        with:
          name: compiler-jar
          path: build/compiler
      - run: bun run build:native -- --compiler-jar build/compiler/compiler.jar
      - uses: actions/upload-artifact@v4
        with:
          name: gcc-linux-arm64
          path: build/gcc-linux-arm64
          if-no-files-found: error

  build_windows:
    name: build gcc-windows
    needs: compiler_jar
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm-community
          java-version: "21"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: "true"
      - uses: actions/download-artifact@v4
        with:
          name: compiler-jar
          path: build/compiler
      - run: bun run build:native -- --compiler-jar build/compiler/compiler.jar
      - uses: actions/upload-artifact@v4
        with:
          name: gcc-windows
          path: build/gcc-windows
          if-no-files-found: error

  publish:
    name: publish packages
    needs:
      - build_kdts
      - build_linux
      - build_linux_arm64
      - build_macos
      - build_windows
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - uses: actions/download-artifact@v4
        with:
          name: kdts
          path: build/kdts
      - uses: actions/download-artifact@v4
        with:
          name: gcc-linux
          path: build/gcc-linux
      - uses: actions/download-artifact@v4
        with:
          name: gcc-linux-arm64
          path: build/gcc-linux-arm64
      - uses: actions/download-artifact@v4
        with:
          name: gcc-macos
          path: build/gcc-macos
      - uses: actions/download-artifact@v4
        with:
          name: gcc-windows
          path: build/gcc-windows
      - run: |
          chmod 755 build/gcc-linux/compiler
          chmod 755 build/gcc-linux-arm64/compiler
          chmod 755 build/gcc-macos/compiler
          chmod 755 build/gcc-windows/compiler.exe
      - run: bun run publish:packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
